[General]
network = InetSampleNetwork

sim-time-limit = 3s

*.*.ipv4.arp.typename = "GlobalArp"
*.*.ipv4.routingTable.netmaskRoutes = ""

*.host1.numApps = 1
*.host1.app[0].typename = "PingApp"
*.host1.app[0].destAddr = "host7"

*.host4.numApps = 1
*.host4.app[0].typename = "PingApp"
*.host4.app[0].destAddr = "host0"